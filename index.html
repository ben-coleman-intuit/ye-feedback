<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ben Coleman YE Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --slate-100: #f1f5f9;
      --border: #e2e8f0;
      --summary-bg: linear-gradient(135deg, #eff6ff 0%, #eef2ff 100%);
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app-header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .app-header-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    .app-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .tab {
      appearance: none;
      background: none;
      border: none;
      padding: 0.75rem 1rem;
      margin-bottom: -1px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab[aria-selected="true"] {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .panel {
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .submit-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 42vh;
      justify-content: flex-start;
    }

    .form-card {
      width: 100%;
      max-width: 520px;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 0.75rem 0.875rem;
      font-family: inherit;
      font-size: 0.9375rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .field textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.55;
    }

    .btn-submit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.65rem 1.5rem;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .btn-submit:hover {
      background: var(--primary-hover);
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    .toast {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #166534;
      background: #dcfce7;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      text-align: center;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.25s ease, max-height 0.25s ease, margin 0.25s ease, padding 0.25s ease;
    }

    .toast.visible {
      opacity: 1;
      max-height: 4rem;
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
    }

    .summary-section {
      background: var(--summary-bg);
      border: 1px solid #c7d2fe;
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.75rem;
      box-shadow: var(--shadow);
    }

    .summary-section h2 {
      margin: 0 0 0.75rem;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #4338ca;
    }

    .themes-hint {
      margin: 0;
      font-size: 0.9375rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .theme-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .theme-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #3730a3;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid #a5b4fc;
      border-radius: 999px;
    }

    .theme-tag .count {
      font-weight: 700;
      color: var(--primary);
    }

    .themes-summary {
      font-size: 0.875rem;
      color: var(--text-secondary, #475467);
      margin-top: 0.75rem;
      line-height: 1.6;
      font-style: normal;
    }

    .feedback-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .feedback-card {
      background: var(--slate-100);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.125rem 1.25rem;
      box-shadow: var(--shadow);
    }

    .feedback-card .name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      margin: 0 0 0.25rem;
    }

    .feedback-card .time {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 0 0 0.75rem;
    }

    .feedback-card .body {
      margin: 0;
      font-size: 0.9375rem;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted);
      font-size: 0.9375rem;
      background: var(--slate-100);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    @media (max-width: 480px) {
      .app-header h1 {
        font-size: 1.125rem;
      }

      .tab {
        flex: 1;
        text-align: center;
        padding: 0.65rem 0.5rem;
        font-size: 0.875rem;
      }

      .main {
        padding: 1rem 1rem 2.5rem;
      }

      .summary-section {
        padding: 1rem 1.125rem;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <h1>Ben Coleman YE Feedback</h1>
    </div>
  </header>

  <main class="main">
    <div class="tabs" role="tablist" aria-label="Feedback sections">
      <button type="button" class="tab" role="tab" id="tab-submit" aria-selected="true" aria-controls="panel-submit" data-tab="submit">Submit Feedback</button>
      <button type="button" class="tab" role="tab" id="tab-view" aria-selected="false" aria-controls="panel-view" data-tab="view">View Feedback</button>
    </div>

    <section id="panel-submit" class="panel active" role="tabpanel" aria-labelledby="tab-submit">
      <div class="submit-layout">
        <form class="form-card" id="feedback-form" novalidate>
          <div class="field">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" autocomplete="name" placeholder="Jane Doe" required />
          </div>
          <div class="field">
            <label for="feedback">Feedback</label>
            <textarea id="feedback" name="feedback" placeholder="Share your thoughts, suggestions, or concerns…" required></textarea>
          </div>
          <button type="submit" class="btn-submit">Submit</button>
        </form>
        <div id="submit-toast" class="toast" role="status" aria-live="polite">Thank you — your feedback has been saved.</div>
      </div>
    </section>

    <section id="panel-view" class="panel" role="tabpanel" aria-labelledby="tab-view" hidden>
      <div class="summary-section" id="summary-section">
        <h2>Key Themes</h2>
        <div id="themes-content"></div>
      </div>
      <div id="feedback-list" class="feedback-list"></div>
    </section>
  </main>

  <script>
    (function () {
      var STORAGE_KEY = "feedback_portal_entries";
      var STOP_WORDS = new Set([
        "a", "an", "the", "and", "or", "but", "if", "then", "else", "when", "at", "from", "by", "for", "with",
        "about", "against", "between", "into", "through", "during", "before", "after", "above", "below", "to", "of",
        "in", "out", "on", "off", "over", "under", "again", "further", "once", "here", "there", "all", "both", "each",
        "few", "more", "most", "other", "some", "such", "no", "nor", "not", "only", "own", "same", "so", "than", "too",
        "very", "can", "will", "just", "should", "now", "is", "are", "was", "were", "be", "been", "being", "have", "has",
        "had", "do", "does", "did", "doing", "would", "could", "may", "might", "must", "shall", "it", "its", "this",
        "that", "these", "those", "i", "me", "my", "we", "our", "you", "your", "he", "him", "his", "she", "her", "they",
        "them", "their", "what", "which", "who", "whom", "as", "also", "am", "how", "why", "where", "any", "because",
        "up", "down", "out", "get", "got", "getting", "go", "going", "went", "make", "made", "like", "just", "really",
        "think", "thought", "know", "want", "need", "way", "well", "even", "much", "such", "thing", "things", "something",
        "nothing", "everything", "please", "thanks", "thank", "hi", "hello", "hey", "yes", "no", "ok", "okay", "ben", "etc"
      ]);

      function loadEntries() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          var parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          return [];
        }
      }

      function saveEntries(entries) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      }

      function formatTimestamp(iso) {
        try {
          var d = new Date(iso);
          if (isNaN(d.getTime())) return iso;
          return d.toLocaleString(undefined, {
            dateStyle: "medium",
            timeStyle: "short"
          });
        } catch (e) {
          return iso;
        }
      }

      function tokenize(text) {
        return text
          .toLowerCase()
          .replace(/[^a-z0-9\s'-]/g, " ")
          .split(/\s+/)
          .filter(function (w) {
            return w.length > 2 && !STOP_WORDS.has(w) && !/^\d+$/.test(w);
          });
      }

      function computeThemes(entries) {
        var nameWords = new Set();
        entries.forEach(function (entry) {
          tokenize(entry.name || "").forEach(function (w) { nameWords.add(w); });
        });
        var counts = {};
        entries.forEach(function (entry) {
          tokenize(entry.feedback || "").forEach(function (word) {
            if (!nameWords.has(word)) {
              counts[word] = (counts[word] || 0) + 1;
            }
          });
        });
        return Object.keys(counts)
          .map(function (k) {
            return { word: k, count: counts[k] };
          })
          .sort(function (a, b) {
            if (b.count !== a.count) return b.count - a.count;
            return a.word.localeCompare(b.word);
          });
      }

      function renderThemes(container, entries) {
        container.innerHTML = "";
        if (entries.length < 3) {
          var p = document.createElement("p");
          p.className = "themes-hint";
          p.textContent = "Submit more feedback to see themes";
          container.appendChild(p);
          return;
        }
        var themes = computeThemes(entries);
        if (themes.length === 0) {
          var empty = document.createElement("p");
          empty.className = "themes-hint";
          empty.textContent = "No recurring words yet — try longer messages.";
          container.appendChild(empty);
          return;
        }
        var topCount = themes.length < 5 ? themes.length : Math.min(8, themes.length);
        var wrap = document.createElement("div");
        wrap.className = "theme-tags";
        for (var i = 0; i < topCount; i++) {
          var t = themes[i];
          var tag = document.createElement("span");
          tag.className = "theme-tag";
          var label = t.word.charAt(0).toUpperCase() + t.word.slice(1);
          tag.appendChild(document.createTextNode(label + " "));
          var cnt = document.createElement("span");
          cnt.className = "count";
          cnt.textContent = String(t.count);
          tag.appendChild(cnt);
          wrap.appendChild(tag);
        }
        container.appendChild(wrap);
        // Build a natural summary from actual feedback text
        var summaryEl = document.createElement("p");
        summaryEl.className = "themes-summary";

        // Helper: find the best sentence from feedback containing a keyword
        function findSentence(keyword, entries) {
          for (var i = 0; i < entries.length; i++) {
            var text = entries[i].feedback || "";
            // Split into sentences
            var sentences = text.split(/[.!?]+/).filter(function(s) { return s.trim().length > 10; });
            for (var j = 0; j < sentences.length; j++) {
              if (sentences[j].toLowerCase().indexOf(keyword) !== -1) {
                return sentences[j].trim();
              }
            }
          }
          return null;
        }

        var n = entries.length;
        var topWords = themes.slice(0, 3).map(function(t) { return t.word; });
        var snippets = [];
        var usedEntries = new Set();

        // Collect unique relevant snippets
        topWords.forEach(function(word) {
          for (var i = 0; i < entries.length; i++) {
            if (usedEntries.has(i)) continue;
            var text = entries[i].feedback || "";
            var sentences = text.split(/[.!?\n]+/).filter(function(s) { return s.trim().length > 15; });
            for (var j = 0; j < sentences.length; j++) {
              if (sentences[j].toLowerCase().indexOf(word) !== -1) {
                snippets.push(sentences[j].trim());
                usedEntries.add(i);
                break;
              }
            }
            if (snippets.length >= 3) break;
          }
        });

        // If we couldn't find keyword-matching sentences, take the first sentence from each entry
        if (snippets.length === 0) {
          for (var i = 0; i < Math.min(3, entries.length); i++) {
            var first = (entries[i].feedback || "").split(/[.!?\n]+/)[0];
            if (first && first.trim().length > 10) snippets.push(first.trim());
          }
        }

        // Build the summary
        var summaryText;
        if (snippets.length === 0) {
          summaryText = "Feedback has been received from " + n + " respondents covering a range of topics.";
        } else if (snippets.length === 1) {
          summaryText = "Across " + n + " responses, a key theme is that " + snippets[0].charAt(0).toLowerCase() + snippets[0].slice(1) + ".";
        } else {
          summaryText = "Across " + n + " responses, contributors noted that " +
            snippets[0].charAt(0).toLowerCase() + snippets[0].slice(1) +
            ". Additionally, feedback highlighted that " +
            snippets[1].charAt(0).toLowerCase() + snippets[1].slice(1) + ".";
          if (snippets.length >= 3) {
            summaryText += " Several respondents also mentioned that " +
              snippets[2].charAt(0).toLowerCase() + snippets[2].slice(1) + ".";
          }
        }

        summaryEl.textContent = summaryText;
        container.appendChild(summaryEl);
      }

      function renderList(container, entries) {
        container.innerHTML = "";
        if (entries.length === 0) {
          var empty = document.createElement("div");
          empty.className = "empty-state";
          empty.textContent = "No feedback submitted yet. Switch to Submit Feedback to add the first entry.";
          container.appendChild(empty);
          return;
        }
        var sorted = entries.slice().sort(function (a, b) {
          return new Date(b.timestamp) - new Date(a.timestamp);
        });
        sorted.forEach(function (entry) {
          var card = document.createElement("article");
          card.className = "feedback-card";
          var nameEl = document.createElement("p");
          nameEl.className = "name";
          nameEl.textContent = entry.name || "Anonymous";
          var timeEl = document.createElement("p");
          timeEl.className = "time";
          timeEl.textContent = formatTimestamp(entry.timestamp);
          var bodyEl = document.createElement("p");
          bodyEl.className = "body";
          bodyEl.textContent = entry.feedback || "";
          card.appendChild(nameEl);
          card.appendChild(timeEl);
          card.appendChild(bodyEl);
          container.appendChild(card);
        });
      }

      function refreshView() {
        var entries = loadEntries();
        var themesEl = document.getElementById("themes-content");
        var listEl = document.getElementById("feedback-list");
        renderThemes(themesEl, entries);
        renderList(listEl, entries);
      }

      var form = document.getElementById("feedback-form");
      var toast = document.getElementById("submit-toast");
      var toastTimer;

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var nameInput = document.getElementById("name");
        var feedbackInput = document.getElementById("feedback");
        var name = nameInput.value.trim();
        var feedback = feedbackInput.value.trim();
        if (!name || !feedback) return;

        var entries = loadEntries();
        entries.push({
          name: name,
          feedback: feedback,
          timestamp: new Date().toISOString()
        });
        saveEntries(entries);

        form.reset();
        clearTimeout(toastTimer);
        toast.classList.add("visible");
        toastTimer = setTimeout(function () {
          toast.classList.remove("visible");
        }, 3200);

        refreshView();
      });

      var tabs = document.querySelectorAll(".tab");
      var panels = {
        submit: document.getElementById("panel-submit"),
        view: document.getElementById("panel-view")
      };

      function setTab(id) {
        tabs.forEach(function (btn) {
          var on = btn.getAttribute("data-tab") === id;
          btn.setAttribute("aria-selected", on ? "true" : "false");
        });
        Object.keys(panels).forEach(function (key) {
          var p = panels[key];
          var active = key === id;
          p.classList.toggle("active", active);
          p.hidden = !active;
        });
        if (id === "view") refreshView();
      }

      tabs.forEach(function (btn) {
        btn.addEventListener("click", function () {
          setTab(btn.getAttribute("data-tab"));
        });
      });

      refreshView();
    })();
  </script>
</body>
</html>
